name: restro
description: Restro Operator — Indian restaurant POS for waiters..
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing (Navigator 2.0 wrapper)
  go_router: ^14.6.2

  # Liquid Glass rendering (iOS 26 style)
  liquid_glass_renderer: 0.2.0-dev.4  # pinned pre-release — update when stable

  # QR scanning for device pairing
  mobile_scanner: ^7.2.0

  # Currency formatting (₹), date filters
  intl: ^0.19.0

  # Utility
  collection: ^1.18.0
  socket_io_client: ^3.0.2
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Cormorant
      fonts:
        - asset: assets/fonts/CormorantGaramond.ttf
          weight: 400
        - asset: assets/fonts/CormorantGaramond.ttf
          weight: 500
        - asset: assets/fonts/CormorantGaramond.ttf
          weight: 600
